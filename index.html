<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>경영관리실 Cafe Order Mate</title>
    <style>
        :root { --main-color: #004b9d; --bg-color: #f4f7f6; --accent: #3498db; }
        body { font-family: -apple-system, "Malgun Gothic", sans-serif; background-color: var(--bg-color); color: #333; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        /* 좌측 정렬 및 세련된 폰트 비중 조절 */
        .header-container { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #eee; text-align: left; }
        .header-container img { height: 42px; width: auto; }
        .header-text h1 { font-size: 19px; margin: 0; color: var(--main-color); letter-spacing: -0.5px; font-weight: 800; }
        .header-text p { font-size: 11px; margin: 2px 0 0 0; color: #7f8c8d; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; }

        .box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; color: #555; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 12px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { padding: 12px 5px; border: 1px solid #ddd; background: white; border-radius: 8px; font-size: 14px; cursor: pointer; text-align: center; word-break: keep-all; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
        .btn.active { background: var(--main-color); color: white; border-color: var(--main-color); font-weight: bold; }
        
        .temp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .options { display: flex; gap: 15px; margin-bottom: 15px; font-size: 14px; }
        .add-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .summary-title { font-size: 16px; font-weight: bold; margin: 20px 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .order-list { font-size: 14px; margin-bottom: 15px; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .delete-btn { color: #e74c3c; font-weight: bold; cursor: pointer; padding: 0 10px; }
        .tally-list { background: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; border-left: 4px solid var(--main-color); }
        .tally-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        
        .total-summary-box { background: #f0f7ff; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: right; border: 1px solid #d6e8fa; }
        .total-cups { font-size: 16px; font-weight: bold; color: var(--main-color); margin-bottom: 5px; }
        .total-price { font-size: 18px; font-weight: bold; color: #e74c3c; }
        
        .copy-btn { width: 100%; padding: 15px; background: #34495e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="logo.png" alt="CI">
        <div class="header-text">
            <h1>경영관리실 Cafe Order Mate</h1>
            <p>Smart Coffee Aggregator Service</p>
        </div>
    </div>

    <div class="box">
        <label>👤 주문자 성함</label>
        <input type="text" id="userName" placeholder="예: 사장님, 부장님, 과장님">

        <label>1️⃣ 카테고리 선택</label>
        <div class="grid-container" id="categoryGroup">
            <div class="btn active" onclick="setCategory('coffee', this)">커피</div>
            <div class="btn" onclick="setCategory('latte', this)">라떼</div>
            <div class="btn" onclick="setCategory('tea', this)">티</div>
            <div class="btn" onclick="setCategory('ade', this)">에이드</div>
            <div class="btn" onclick="setCategory('smoothie', this)">스무디</div>
            <div class="btn" onclick="setCategory('frapp', this)">프라푸치노</div>
        </div>

        <label>2️⃣ 메뉴 선택</label>
        <div class="grid-container" id="menuGroup"></div>

        <div id="tempSection">
            <label>3️⃣ 온도 설정</label>
            <div class="temp-grid" id="tempGroup">
                <div class="btn active" onclick="setTemp('ICE', this)">ICE 🧊</div>
                <div class="btn" onclick="setTemp('HOT', this)">HOT 🔥</div>
            </div>
        </div>

        <div class="options">
            <label><input type="checkbox" id="shotAdd" onchange="updatePrice()"> 샷 추가(+300원)</label>
            <label><input type="checkbox" id="tumbler" onchange="updatePrice()"> 텀블러(-100원)</label>
        </div>

        <button class="add-btn" onclick="addOrder()">내역 추가하기 (<span id="currentPrice">0</span>원)</button>
    </div>

    <div class="box">
        <div class="summary-title">📜 실시간 취합 현황</div>
        <div id="orderList" class="order-list">등록된 주문이 없습니다.</div>

        <div class="summary-title">📊 메뉴별 수량 요약</div>
        <div id="tallyList" class="tally-list">-</div>

        <div class="total-summary-box">
            <div class="total-cups">총 주문 수량: <span id="totalCups">0</span>잔</div>
            <div class="total-price">총 결제 금액: <span id="totalPrice">0</span>원</div>
        </div>
        
        <button class="copy-btn" onclick="copyToClipboard()">주문 내역 복사하기</button>
    </div>

    <script>
        const menuData = {
            coffee: { "에스프레소": 1300, "아메리카노": 1300, "카페라떼": 1700, "카푸치노": 1700, "바닐라라떼": 2000, "돌체라떼": 2000, "카페모카": 2000, "민트모카": 2000, "헤이즐넛라떼": 2000, "카라멜마끼아또": 2000 },
            latte: { "스팀밀크": 1300, "녹차라떼": 1900, "고구마라떼": 1900, "초코라떼": 1900, "홍차라떼": 2100, "미숫가루": 1900 },
            tea: { "자몽차": 1500, "레몬차": 1500, "생강차": 1500, "레몬생강차": 1500, "유자차": 1500, "제주청귤차": 1500, "루이보스": 1500, "히비스커스": 1500, "페퍼민트": 1500, "캐모마일": 1500, "자스민": 1500, "녹차": 1500, "얼그레이": 1500, "아이스티(복숭아)": 1500, "아이스티(레몬)": 1500, "감로차": 1500 },
            ade: { "청귤에이드": 2000, "깔라만시에이드": 2000, "청포도에이드": 2000, "자몽에이드": 2500, "레몬에이드": 2500 },
            smoothie: { "요거트스무디": 1800, "딸기스무디": 1800, "블루베리스무디": 1800, "키위스무디": 1800, "요거트딸기": 2000, "요거트키위": 2000, "요거트블루베리": 2000 },
            frapp: { "자바칩프라푸치노": 2400, "쿠키앤크림프라푸치노": 2400, "녹차프라푸치노": 2300 }
        };

        let currentCategory = 'coffee';
        let currentMenu = '';
        let currentMenuPrice = 0;
        let currentTemp = 'ICE';
        let orders = [];

        function init() { setCategory('coffee', document.querySelector('#categoryGroup .btn.active')); }

        function setCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('#categoryGroup .btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const tempSection = document.getElementById('tempSection');
            if(cat === 'ade' || cat === 'smoothie' || cat === 'frapp') {
                tempSection.style.display = 'none';
                currentTemp = 'ICE';
            } else {
                tempSection.style.display = 'block';
            }
            currentMenu = '';
            currentMenuPrice = 0;
            renderMenus();
            updatePrice();
        }

        function renderMenus() {
            const menuGroup = document.getElementById('menuGroup');
            menuGroup.innerHTML = '';
            for(let item in menuData[currentCategory]) {
                let btn = document.createElement('div');
                btn.className = 'btn';
                btn.innerHTML = item;
                btn.onclick = function() { setMenu(item, menuData[currentCategory][item], this); };
                menuGroup.appendChild(btn);
            }
        }

        function setMenu(menu, price, el) {
            currentMenu = menu;
            currentMenuPrice = price;
            document.querySelectorAll('#menuGroup .btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updatePrice();
        }

        function setTemp(temp, el) {
            currentTemp = temp;
            document.querySelectorAll('#tempGroup .btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function updatePrice() {
            let priceDisplay = document.getElementById('currentPrice');
            if(!currentMenu) { priceDisplay.innerText = '0'; return; }
            let price = currentMenuPrice;
            if(document.getElementById('shotAdd').checked) price += 300;
            if(document.getElementById('tumbler').checked) price -= 100;
            priceDisplay.innerText = price;
        }

        function addOrder() {
            let name = document.getElementById('userName').value.trim();
            if(!currentMenu) { alert('메뉴를 선택해주세요!'); return; }
            if(!name) name = "익명";
            const price = parseInt(document.getElementById('currentPrice').innerText);
            let options = [];
            if(document.getElementById('shotAdd').checked) options.push('샷추가');
            if(document.getElementById('tumbler').checked) options.push('텀블러');
            let finalMenuName = `[${currentTemp}] ${currentMenu}`;
            if(options.length > 0) finalMenuName += ` (${options.join(',')})`;
            orders.push({ name: name, menuName: finalMenuName, price: price });
            document.getElementById('userName').value = '';
            document.getElementById('shotAdd').checked = false;
            document.getElementById('tumbler').checked = false;
            currentMenu = '';
            currentMenuPrice = 0;
            document.querySelectorAll('#menuGroup .btn').forEach(b => b.classList.remove('active'));
            updatePrice();
            renderOrders();
        }

        function removeOrder(index) { orders.splice(index, 1); renderOrders(); }

        function renderOrders() {
            const list = document.getElementById('orderList');
            const tallyList = document.getElementById('tallyList');
            if (orders.length === 0) {
                list.innerHTML = '등록된 주문이 없습니다.';
                tallyList.innerHTML = '-';
                document.getElementById('totalCups').innerText = '0';
                document.getElementById('totalPrice').innerText = '0';
                return;
            }
            list.innerHTML = '';
            let total = 0;
            let menuCount = {};
            orders.forEach((o, index) => {
                total += o.price;
                list.innerHTML += `<div class="order-item">
                    <div><b>${o.name}</b> : ${o.menuName}</div>
                    <div><span class="delete-btn" onclick="removeOrder(${index})">삭제</span></div>
                </div>`;
                menuCount[o.menuName] = (menuCount[o.menuName] || 0) + 1;
            });
            tallyList.innerHTML = '';
            for(let key in menuCount) {
                tallyList.innerHTML += `<div class="tally-item"><span>${key}</span><span>${menuCount[key]}잔</span></div>`;
            }
            document.getElementById('totalCups').innerText = orders.length;
            document.getElementById('totalPrice').innerText = total.toLocaleString();
        }

        function copyToClipboard() {
            if(orders.length === 0) { alert('주문 내역이 없습니다.'); return; }
            let text = "🏢 경영관리실 Cafe Order Mate\n\n[개별 현황]\n";
            orders.forEach(o => text += `${o.name} : ${o.menuName}\n`);
            text += "\n[카페 제출용 요약]\n";
            let menuCount = {};
            orders.forEach(o => menuCount[o.menuName] = (menuCount[o.menuName] || 0) + 1);
            for(let key in menuCount) text += `${key} : ${menuCount[key]}잔\n`;
            text += `\n☕ 총 주문 수량: ${orders.length}잔`;
            text += `\n💰 총 결제 금액: ${document.getElementById('totalPrice').innerText}원\n(운영: 경영관리실)`;
            navigator.clipboard.writeText(text).then(() => alert('주문 내역이 복사되었습니다!'));
        }
        window.onload = init;
    </script>
</body>
</html>
